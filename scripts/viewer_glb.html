<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>GLB viewer</title>
<style>
  /* Responsive by design: works on a phone over LAN wifi and on a big display.
     Base font scales with viewport; the HUD is a side panel on desktop and a
     collapsible bottom sheet on narrow/touch screens. */
  html,body{margin:0;height:100%;overflow:hidden;color:#e6e8ea;
            font:clamp(13px, 1.05vw, 17px)/1.5 system-ui,sans-serif}
  canvas{touch-action:none}                 /* OrbitControls owns all gestures; no page pinch/scroll */
  #hud{position:fixed;top:12px;left:14px;z-index:10;background:rgba(20,22,26,.86);
       padding:12px 14px;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.4);
       max-height:92vh;overflow:auto;width:min(250px,80vw);-webkit-overflow-scrolling:touch}
  #hud b{color:#fff;font-size:1.08em}
  #hud label{display:block;margin-top:6px;cursor:pointer;user-select:none;padding:2px 0}
  #hud hr{border:0;border-top:1px solid #ffffff22;margin:10px 0 6px}
  #hudbtn{position:fixed;top:10px;left:10px;z-index:11;display:none;width:44px;height:44px;
          border-radius:10px;border:1px solid #ffffff33;background:rgba(20,22,26,.86);color:#e6e8ea;
          font-size:20px;line-height:44px;text-align:center;cursor:pointer;user-select:none}
  .sw{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:6px;vertical-align:middle}
  .hint{margin-top:10px;opacity:.6;font-size:.9em}
  #parts{margin-top:8px;max-height:34vh;overflow:auto}
  input[type=range]{width:150px;vertical-align:middle}
  input[type=checkbox]{width:1.1em;height:1.1em;vertical-align:middle}
  select{background:#2a2f38;color:#e6e8ea;border:1px solid #ffffff22;border-radius:4px;font:inherit}
  /* CAD-style dimension labels (always face camera, follow their part) */
  .dlabel{font:700 11px ui-monospace,Menlo,monospace;white-space:nowrap;padding:1px 6px;border-radius:5px;
          background:#12141999;border:1px solid #ffffff22}
  #legend{margin-top:6px;font-size:.88em;opacity:.85;display:none}
  @media (max-width:700px), (pointer:coarse) and (max-height:500px){
    #hudbtn{display:block}
    #hud{top:auto;left:0;right:0;bottom:0;width:auto;max-height:52vh;border-radius:14px 14px 0 0;
         padding-bottom:calc(12px + env(safe-area-inset-bottom))}
    #hud.collapsed{display:none}
    #hud label{margin-top:10px;padding:4px 0}          /* fatter touch targets */
    input[type=range]{width:min(60vw,260px);height:28px}
    input[type=checkbox]{width:1.35em;height:1.35em}
    #parts{max-height:22vh}
    .hint{display:none}
  }
</style>
</head>
<body>
<div id="hudbtn" title="toggle controls">☰</div>
<div id="hud">
  <b id="title">assembly</b>
  <div id="bbox" style="opacity:.7;margin-top:3px"></div>
  <div id="parts"></div>
  <hr>
  <label><input type="checkbox" id="t_solid"> &nbsp;solid (vs ghost-outline)</label>
  <label><input type="checkbox" id="t_dims"> &nbsp;dimensions (per part, L/W/H)</label>
  <div id="legend">
    <span style="color:#ff8f8f">L = length (X)</span> ·
    <span style="color:#86e29a">W = width (Y)</span> ·
    <span style="color:#8fc8fb">H = height (Z)</span>
  </div>
  <label style="margin-top:8px">explode <input type="range" id="explode" min="0" max="1" step="0.01" value="0"></label>
  <div id="fitsec" hidden>
    <hr>
    <label><input type="checkbox" id="t_fits"> &nbsp;fits · clearance/press map</label>
    <div id="fitrows" style="max-height:180px;overflow:auto;margin-top:4px"></div>
    <div style="opacity:.55;font-size:10px;margin-top:3px">
      <span style="color:#ff6b6b">■</span> press · <span style="color:#ffb300">■</span> &lt;0.15 ·
      <span style="color:#ffd866">■</span> &lt;0.4 · <span style="color:#6ecf7a">■</span> free —
      patches trace contact areas; click a row to isolate</div>
  </div>
  <hr>
  <label><input type="checkbox" id="t_section"> &nbsp;section cut
    <select id="sec_axis"><option>X</option><option>Y</option><option>Z</option></select></label>
  <label>cut <input type="range" id="cut" min="0" max="1" step="0.01" value="0.5"></label>
  <hr>
  <label><input type="checkbox" id="t_spin"> &nbsp;▶ spin (Z)
    <input type="range" id="spinspd" min="5" max="120" step="5" value="35" style="width:70px"></label>
  <div class="hint">drag = orbit · scroll = zoom · right-drag = pan · touch: 1 finger orbit, 2 fingers pan/zoom · auto-reloads on rebuild</div>
</div>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
window.THREE = THREE;                                  // headless (shoot.py) needs THREE in scope

const q = new URLSearchParams(location.search);
const MODEL = q.get('m') || 'assembly.glb';
document.getElementById('title').textContent = MODEL;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x20242b);
const camera = new THREE.PerspectiveCamera(42, innerWidth/innerHeight, 0.1, 50000);
camera.up.set(0,0,1);                                  // Z up (print-bed convention)

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));   // phones report 3x; >2 just burns GPU on big meshes
renderer.localClippingEnabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;    // raw light intensities clip to white without this
document.body.appendChild(renderer.domElement);

// CSS2D overlay for crisp camera-facing dimension labels
const labelRnd = new CSS2DRenderer(); labelRnd.setSize(innerWidth, innerHeight);
labelRnd.domElement.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none';
document.body.appendChild(labelRnd.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
window._cam = camera; window._controls = controls; window._scene = scene;   // headless render hooks

scene.add(new THREE.HemisphereLight(0xffffff, 0x32383f, 1.05));
const key = new THREE.DirectionalLight(0xffffff, 1.5); key.position.set(90,-110,150); scene.add(key);
const fill= new THREE.DirectionalLight(0xbcd2ff, 0.5); fill.position.set(-120,60,-30); scene.add(fill);
const rim = new THREE.DirectionalLight(0xffffff, 0.7); rim.position.set(-40,140,40); scene.add(rim);
// print-bed grid on the XY plane (Z-up the right way: rotate the helper, don't rotate geometry)
const grid = new THREE.GridHelper(1000,50,0x2a2f38,0x23272e); grid.rotation.x=Math.PI/2; scene.add(grid);

// section plane positioned at runtime from the bbox
const sectionPlane = new THREE.Plane(new THREE.Vector3(-1,0,0), 0);

// deterministic per-name color (stable across reloads)
function colorFor(name){
  let h=0; for(const c of name) h=(h*31 + c.charCodeAt(0))>>>0;
  const hue=(h%360)/360; const col=new THREE.Color(); col.setHSL(hue,0.55,0.55); return col.getHex();
}
function isHousing(name){ return /hous|box|case|lid|enclos|shell|cover|conduit|panel|body/i.test(name); }

// dimension-line helpers (shared with parts_viewer.py)
const COLX=0xff6b6b, COLY=0x51cf66, COLZ=0x4dabf7, TXT={x:'#ff8f8f',y:'#86e29a',z:'#8fc8fb'};
function line(p1,p2,color){return new THREE.Line(new THREE.BufferGeometry().setFromPoints([p1,p2]),new THREE.LineBasicMaterial({color}));}
function tick(p,ax,len,color){const a=p.clone(),b=p.clone();a[ax]-=len/2;b[ax]+=len/2;return line(a,b,color);}
function dlabel(t,css){const d=document.createElement('div');d.className='dlabel';d.textContent=t;d.style.color=css;d.style.borderColor=css+'66';return new CSS2DObject(d);}

const groups = {};      // name -> {meshes:[], ghost, home:Vector3[], dim:Group, dimHome:Vector3, explodeDir:Vector3}
const dimsRoot = new THREE.Group(); scene.add(dimsRoot);
let bbox = new THREE.Box3(), center = new THREE.Vector3(), diag = 1;

new GLTFLoader().load(MODEL, (gltf)=>{
  gltf.scene.traverse(o=>{
    if(!o.isMesh) return;
    const name = o.name || (o.parent && o.parent.name) || 'part';
    o.geometry.computeVertexNormals();                 // GLB normals often come through inverted/unlit
    const ghost = isHousing(name);
    const col = colorFor(name);
    if(ghost){
      o.material = new THREE.MeshStandardMaterial({color:0x9aa3ad,metalness:0,roughness:.85,
        transparent:true,opacity:.12,depthWrite:false,side:THREE.DoubleSide});
      const e = new THREE.LineSegments(new THREE.EdgesGeometry(o.geometry,35),
        new THREE.LineBasicMaterial({color:0xcdd6df,transparent:true,opacity:.6}));
      o.add(e); o.userData.edge = e;
    } else {
      o.material = new THREE.MeshStandardMaterial({color:col,metalness:.2,roughness:.5,
        side:THREE.DoubleSide,emissive:col,emissiveIntensity:.05});
    }
    (groups[name] = groups[name] || {meshes:[],ghost}).meshes.push(o);
  });
  scene.add(gltf.scene);

  bbox.setFromObject(gltf.scene);
  bbox.getCenter(center);
  const sz = bbox.getSize(new THREE.Vector3());
  diag = sz.length();
  const r = diag/2;
  controls.target.copy(center);
  camera.position.set(center.x + r*1.4, center.y - r*1.8, center.z + r*1.1);
  controls.update();
  sectionPlane.constant = center.x;                    // start cut at center
  document.getElementById('bbox').textContent =
    `X ${sz.x.toFixed(1)}  Y ${sz.y.toFixed(1)}  Z ${sz.z.toFixed(1)} mm`;

  // per-group: record home positions, explode direction, and build dimension annotations
  const host = document.getElementById('parts');
  for(const [name,g] of Object.entries(groups)){
    g.home = g.meshes.map(o=>o.position.clone());

    // group world bbox -> centroid for explode direction
    const gb = new THREE.Box3(); g.meshes.forEach(o=>gb.expandByObject(o));
    const gc = gb.getCenter(new THREE.Vector3());
    g.explodeDir = gc.clone().sub(center);
    if(g.explodeDir.lengthSq() < 1e-6) g.explodeDir.set(0,0,1); else g.explodeDir.normalize();

    // dimension lines on the group bbox (world coords); a sub-group so explode can offset it
    const mn=gb.min, mx=gb.max, c=gc, s=gb.getSize(new THREE.Vector3());
    const o = Math.max(6, diag*0.02), D = new THREE.Group();
    D.add(line(new THREE.Vector3(mn.x,mn.y-o,mn.z), new THREE.Vector3(mx.x,mn.y-o,mn.z), COLX));
    D.add(tick(new THREE.Vector3(mn.x,mn.y-o,mn.z),'y',o,COLX)); D.add(tick(new THREE.Vector3(mx.x,mn.y-o,mn.z),'y',o,COLX));
    let L=dlabel('L '+s.x.toFixed(0),TXT.x); L.position.set(c.x,mn.y-o,mn.z); D.add(L);
    D.add(line(new THREE.Vector3(mx.x+o,mn.y,mn.z), new THREE.Vector3(mx.x+o,mx.y,mn.z), COLY));
    D.add(tick(new THREE.Vector3(mx.x+o,mn.y,mn.z),'x',o,COLY)); D.add(tick(new THREE.Vector3(mx.x+o,mx.y,mn.z),'x',o,COLY));
    let W=dlabel('W '+s.y.toFixed(0),TXT.y); W.position.set(mx.x+o,c.y,mn.z); D.add(W);
    D.add(line(new THREE.Vector3(mx.x+o,mn.y-o,mn.z), new THREE.Vector3(mx.x+o,mn.y-o,mx.z), COLZ));
    D.add(tick(new THREE.Vector3(mx.x+o,mn.y-o,mn.z),'x',o,COLZ)); D.add(tick(new THREE.Vector3(mx.x+o,mn.y-o,mx.z),'x',o,COLZ));
    let H=dlabel('H '+s.z.toFixed(0),TXT.z); H.position.set(mx.x+o,mn.y-o,c.z); D.add(H);
    D.visible = false; g.dim = D; g.dimHome = D.position.clone(); g.labels=[L,W,H];
    dimsRoot.add(D);

    // per-part toggle row
    const lab = document.createElement('label');
    lab.innerHTML = `<span class="sw" style="background:#${colorFor(name).toString(16).padStart(6,'0')}"></span>`+
                    `<input type="checkbox" checked> ${name}`;
    lab.querySelector('input').addEventListener('change',e=>{
      g.meshes.forEach(o=>o.visible=e.target.checked);
      applyDims();
    });
    host.appendChild(lab);
  }
  applyDims();
  window.__ready = true;
}, undefined, err=>{ document.getElementById('bbox').textContent='LOAD ERROR: '+err; });

const $=id=>document.getElementById(id);

$('t_solid').addEventListener('change',e=>{
  const s=e.target.checked;
  Object.values(groups).filter(g=>g.ghost).forEach(g=>g.meshes.forEach(o=>{
    o.material.opacity=s?.95:.12; o.material.depthWrite=s;
    if(o.userData.edge) o.userData.edge.material.opacity=s?.2:.6;
  }));
});

// dimensions toggle
function applyDims(){
  const on = $('t_dims').checked;
  $('legend').style.display = on ? '' : 'none';
  Object.values(groups).forEach(g=>{
    if(!g.dim) return;
    const vis = on && g.meshes.some(o=>o.visible);
    g.dim.visible = vis;
    g.labels.forEach(l=>{ l.visible=vis; l.element.style.display = vis ? '' : 'none'; });
  });
}
$('t_dims').addEventListener('change',applyDims);

// explode: push each group along its radial direction from the assembly center
$('explode').addEventListener('input',e=>{
  const t = parseFloat(e.target.value), spread = diag*0.6;
  Object.values(groups).forEach(g=>{
    const off = g.explodeDir.clone().multiplyScalar(t*spread);
    g.meshes.forEach((o,i)=>o.position.copy(g.home[i]).add(off));
    if(g.dim) g.dim.position.copy(g.dimHome).add(off);
  });
});

// section cut on a chosen axis
function applySection(){
  const on=$('t_section').checked;
  const axis=$('sec_axis').value, t=parseFloat($('cut').value);
  const n = {X:[-1,0,0], Y:[0,-1,0], Z:[0,0,-1]}[axis];
  sectionPlane.normal.set(n[0],n[1],n[2]);
  const mn=bbox.min, sz=bbox.getSize(new THREE.Vector3());
  const v = {X:mn.x+sz.x*t, Y:mn.y+sz.y*t, Z:mn.z+sz.z*t}[axis];
  sectionPlane.constant = v;                            // normal is -axis, so constant = coordinate
  const planes=on?[sectionPlane]:[];
  Object.values(groups).forEach(g=>g.meshes.forEach(o=>{
    o.material.clippingPlanes=planes;
    if(o.userData.edge) o.userData.edge.material.clippingPlanes=planes;
  }));
}
$('t_section').addEventListener('change',applySection);
$('sec_axis').addEventListener('change',applySection);
$('cut').addEventListener('input',applySection);

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight); labelRnd.setSize(innerWidth,innerHeight);
});

// phone bottom-sheet HUD: collapsed by default on small/touch screens, ☰ toggles
const hud=$('hud'), hudbtn=$('hudbtn');
const small=matchMedia('(max-width:700px)');
if(small.matches) hud.classList.add('collapsed');
hudbtn.addEventListener('click',()=>hud.classList.toggle('collapsed'));

let last=performance.now();
(function loop(t){
  requestAnimationFrame(loop);
  const dt=(t-last)/1000; last=t;
  if($('t_spin').checked){ scene.rotation.z += dt * parseFloat($('spinspd').value)*Math.PI/180; }
  controls.update();
  renderer.render(scene,camera);
  labelRnd.render(scene,camera);
})(last);

// ---- FITS overlay: fit_report.json (scripts/fitmap.py) → per-pair contact-patch point clouds,
// colored by clearance; rows tightest-first; click a row to isolate one pair. Silent if absent. ----
(async()=>{
  let fits=null;
  try{ const r=await fetch('fit_report.json',{cache:'no-store'}); if(r.ok) fits=await r.json(); }catch(e){}
  if(!fits || !fits.length) return;
  document.getElementById('fitsec').removeAttribute('hidden');
  // TEAL = allowed contact (seats/presses via fitmap --allow) · RED = unexpected contact only ·
  // amber/yellow/green = clearance scale. Red always means "look at this".
  const stOf=r=>{const t=r.press||r.mm<=0.005; return t?(r.designed?'ok':'bad'):(r.mm<0.15?'tight':r.mm<0.4?'run':'free');};
  const STC={ok:'#5cc7d4',bad:'#ff6b6b',tight:'#ffb300',run:'#ffd866',free:'#6ecf7a'};
  const colOf=(d,st)=>st==='ok'?STC.ok:(d<0.005?(st==='bad'?STC.bad:STC.tight):d<0.15?STC.tight:d<0.4?STC.run:STC.free);
  let cloud=null;
  function build(){
    cloud=new THREE.Group(); cloud.userData.byPair={};
    fits.forEach((r,idx)=>{
      const pts=(r.patch&&r.patch.length)?r.patch:[[r.at[0],r.at[1],r.at[2],r.mm]];
      const pos=new Float32Array(pts.length*3), col=new Float32Array(pts.length*3);
      const st=stOf(r);
      pts.forEach((q,i)=>{ pos[i*3]=q[0];pos[i*3+1]=q[1];pos[i*3+2]=q[2];
        const c=new THREE.Color(parseInt(colOf(q[3],st).slice(1),16));
        col[i*3]=c.r;col[i*3+1]=c.g;col[i*3+2]=c.b; });
      const g=new THREE.BufferGeometry();
      g.setAttribute('position',new THREE.BufferAttribute(pos,3));
      g.setAttribute('color',new THREE.BufferAttribute(col,3));
      const m=new THREE.Points(g,new THREE.PointsMaterial({size:Math.max(1.2,diag*0.006),vertexColors:true,
        transparent:true,opacity:.9,depthTest:false,sizeAttenuation:true}));
      m.renderOrder=999; cloud.add(m); cloud.userData.byPair[idx]=m;
    });
    scene.add(cloud);
  }
  function focus(idx){ if(!cloud)return;
    Object.entries(cloud.userData.byPair).forEach(([i,m])=>{
      m.material.opacity=(idx==null||+i===idx)?.95:.06;
      m.material.size=(+i===idx)?Math.max(2,diag*0.01):Math.max(1.2,diag*0.006); }); }
  const host=document.getElementById('fitrows');
  fits.forEach((r,idx)=>{
    const el=document.createElement('div');
    el.style.cssText='display:flex;gap:6px;align-items:center;padding:2px 4px;border-radius:6px;cursor:pointer;font:10px/1.4 var(--mono)';
    const st=stOf(r), c=STC[st];
    el.innerHTML='<span style="width:8px;height:8px;border-radius:50%;background:'+c+';flex:0 0 auto"></span>'
      +'<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+r.a+' ↔ '+r.b+'</span>'
      +'<span style="margin-left:auto;color:'+c+'">'
      +(st==='ok'?(r.press?'press '+(-r.mm).toFixed(2):'seated'):st==='bad'?((r.press?'PRESS '+(-r.mm).toFixed(2):'TOUCH')+' !'):r.mm.toFixed(2))+'</span>';
    el.onmouseenter=()=>el.style.background='rgba(255,255,255,.055)';
    el.onmouseleave=()=>el.style.background=el.dataset.on?'rgba(92,199,212,.16)':'';
    el.onclick=()=>{ const on=el.dataset.on;
      host.querySelectorAll('div').forEach(d=>{delete d.dataset.on; d.style.background='';});
      if(on){ focus(null); } else { el.dataset.on='1'; el.style.background='rgba(92,199,212,.16)'; focus(idx); } };
    host.appendChild(el);
  });
  document.getElementById('t_fits').addEventListener('change',e=>{
    if(e.target.checked){ if(!cloud) build(); cloud.visible=true; }
    else if(cloud){ cloud.visible=false; focus(null); }
  });
  const tf_=document.getElementById('t_fits'); tf_.checked=true;    // ON by default when a report exists
  tf_.dispatchEvent(new Event('change'));
})();

// auto-reload when the build script rewrites the model
let stamp=null;
setInterval(async()=>{
  try{ const r=await fetch(MODEL,{method:'HEAD',cache:'no-store'});
    const s=r.headers.get('Last-Modified');
    if(stamp && s && s!==stamp) location.reload();
    stamp = s||stamp;
  }catch(e){}
}, 2000);
</script>
</body>
</html>
